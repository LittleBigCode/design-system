# Try the Diametral Keycloak theme locally: `docker compose up`, then open
# http://localhost:8080 (admin / admin) and set Realm settings → Themes →
# Login theme = diametral, Email theme = diametral.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --spi-theme-cache-themes=false --spi-theme-cache-templates=false
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./diametral:/opt/keycloak/themes/diametral:ro
