name: Publish to GitHub Packages

# Publishes @littlebigcode/design-system to the GitHub Packages npm registry.
# Triggered by pushing a version tag (e.g. v0.2.0) or run manually.
# Uses the built-in GITHUB_TOKEN — no external npm token/secret required.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@littlebigcode"

      - name: Build distributable artifacts (tokens, bundled CSS, WC bundle)
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
