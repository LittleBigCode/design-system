name: Visual regression tests

# Runs Playwright full-page screenshot tests against the showcase.
#
# IMPORTANT: baselines must be generated and committed first
# (see tests/README.md — `npm run test:visual:update`, then commit
# tests/__screenshots__/). CI only *compares* against the committed images;
# if none exist, the run fails. Baselines should be generated on Linux so they
# match this ubuntu-latest runner.

on:
  pull_request:
  workflow_dispatch:

jobs:
  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm i

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npx playwright test

      # On failure, publish the HTML report and any generated diff images so the
      # visual delta can be inspected from the workflow run.
      - name: Upload Playwright report and diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
