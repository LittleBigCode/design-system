name: Publish to npm (public)

# Publishes @diametral/design-system to the PUBLIC npm registry
# (registry.npmjs.org) so anyone can `npm i @diametral/design-system` with
# no auth. Requires an NPM_TOKEN repo secret (an npm automation token for an
# account that owns the @diametral scope/org). Triggered by publishing a
# GitHub Release, or manually. See RELEASE.md.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    # NPM_TOKEN is stored as an *environment* secret, so the job must target that
    # environment to read it. (If you move NPM_TOKEN to a Repository secret, drop
    # this line.)
    environment: default
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@diametral"

      - name: Build distributable artifacts
        run: npm run build

      - name: Publish (public, with provenance)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
