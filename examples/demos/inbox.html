<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox · Diametral Design System</title>
  <link rel="icon" href="../../assets/logo/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/fonts/ufficio.css">
  <link rel="stylesheet" href="../../css/diametral.css">
  <!-- React from a CDN; the import map keeps a single React instance via ?external=react -->
  <script type="importmap">
  { "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react"
  } }
  </script>
  <style>
    /* Page-local layout only — frames the standalone app and lays out the three
       mail regions. All visuals come from existing .ds-* components/tokens. */
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--ds-bg);
      color: var(--ds-ink);
      font-family: var(--ds-font-sans);
      font-size: var(--ds-text-base);
    }
    #app { height: 100vh; }

    /* Subtle fixed back-link, top-left (sits over the sidebar header). */
    .demo-back {
      position: fixed;
      top: 14px;
      left: 18px;
      z-index: 50;
      font-size: var(--ds-text-xs);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ds-ink-faint);
      text-decoration: none;
      opacity: 0.8;
      transition: color var(--ds-transition), opacity var(--ds-transition);
    }
    .demo-back:hover { color: var(--ds-ink); opacity: 1; }

    /* Three-region grid: folders | message list | reading pane. Fills viewport;
       each region scrolls independently. */
    .mail {
      display: grid;
      grid-template-columns: 232px 340px 1fr;
      height: 100vh;
      min-height: 0;
    }
    .mail__col { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
    .mail__folders { border-right: 1px solid var(--ds-rule); }
    .mail__list { border-right: 1px solid var(--ds-rule); }

    /* Region headers — consistent height, flat bottom rule. */
    .mail__head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 var(--ds-space-4);
      height: 56px;
      flex: none;
      border-bottom: 1px solid var(--ds-rule);
    }
    .mail__brand { padding-left: 88px; }
    .mail__title {
      font-family: var(--ds-font-title);
      font-weight: var(--ds-font-weight-title);
      font-size: var(--ds-text-md);
      letter-spacing: -0.3px;
      margin: 0;
    }
    .mail__scroll { overflow-y: auto; flex: 1 1 auto; min-height: 0; }
    .mail__folders-body { padding: var(--ds-space-4); }
    .mail__list-tabs { padding: var(--ds-space-3) var(--ds-space-4) 0; flex: none; }

    /* A message row in the list. */
    .msg {
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      background: none;
      font-family: inherit;
      color: inherit;
      cursor: pointer;
      padding: var(--ds-space-3) var(--ds-space-4);
      border-bottom: 1px solid var(--ds-rule-soft);
      border-left: 2px solid transparent;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--ds-space-3);
      transition: background-color var(--ds-transition), border-color var(--ds-transition);
    }
    .msg:hover { background: var(--ds-bg-alt); }
    .msg:focus-visible { outline: 2px solid var(--ds-focus-ring); outline-offset: -2px; }
    .msg.is-active {
      background: var(--ds-bg-alt);
      border-left-color: var(--ds-accent);
    }
    .msg__main { min-width: 0; }
    .msg__top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .msg__sender { font-weight: 500; font-size: var(--ds-text-sm); }
    .msg.is-unread .msg__sender { font-weight: 600; }
    .msg__time { flex: none; font-size: var(--ds-text-2xs); color: var(--ds-ink-faint); font-variant-numeric: tabular-nums; }
    .msg__subject {
      font-size: var(--ds-text-sm);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg.is-unread .msg__subject { color: var(--ds-ink); }
    .msg__snippet {
      font-size: var(--ds-text-xs);
      color: var(--ds-ink-soft);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg__dot {
      width: 8px; height: 8px; flex: none;
      background: var(--ds-accent);
      margin-top: 6px;
      visibility: hidden;
    }
    .msg.is-unread .msg__dot { visibility: visible; }
    .msg__avatarwrap { display: flex; align-items: flex-start; gap: var(--ds-space-2); }

    /* Reading pane. */
    .read__head {
      display: flex;
      align-items: center;
      gap: var(--ds-space-3);
      padding: var(--ds-space-4) var(--ds-space-5);
      border-bottom: 1px solid var(--ds-rule);
      flex: none;
    }
    .read__headmeta { min-width: 0; flex: 1 1 auto; }
    .read__subject {
      font-family: var(--ds-font-title);
      font-weight: var(--ds-font-weight-title);
      font-size: var(--ds-text-lg);
      letter-spacing: -0.3px;
      margin: 0 0 2px;
    }
    .read__from { font-size: var(--ds-text-sm); color: var(--ds-ink-soft); }
    .read__from b { color: var(--ds-ink); font-weight: 500; }
    .read__actions { display: flex; align-items: center; gap: var(--ds-space-2); }
    .read__body {
      padding: var(--ds-space-5);
      flex: 1 1 auto;
      overflow-y: auto;
      min-height: 0;
      max-width: 720px;
    }
    .read__body p { line-height: var(--ds-leading-relaxed, 1.6); color: var(--ds-ink); margin: 0 0 var(--ds-space-4); }
    .read__reply {
      border-top: 1px solid var(--ds-rule);
      padding: var(--ds-space-4) var(--ds-space-5);
      flex: none;
      display: flex;
      flex-direction: column;
      gap: var(--ds-space-3);
      background: var(--ds-bg-alt);
    }
    .read__reply-actions { display: flex; align-items: center; gap: var(--ds-space-3); }

    @media (max-width: 920px) {
      .mail { grid-template-columns: 220px 1fr; }
      .mail__col--read { display: none; }
    }
  </style>
</head>
<body>
  <a class="demo-back" href="../index.html">← Diametral</a>
  <div id="app">Loading React…</div>

  <script type="module">
    import React from "react";
    import { createRoot } from "react-dom/client";
    import {
      Wordmark, VerticalNav, Badge, Avatar, Tabs, IconButton, Tooltip,
      Textarea, Button, Tag, EmptyState,
    } from "../../react/index.js";

    const h = React.createElement;
    const cxLocal = (...a) => a.filter(Boolean).join(" ");

    /* ---- Sample messages --------------------------------------------------- */
    const MESSAGES = [
      {
        id: 1, sender: "Camille Roy", initials: "CR", email: "camille.roy@lbc.fr",
        subject: "Q2 pricing review — sign-off needed",
        time: "09:42", unread: true, tag: "Pricing",
        body: [
          "Hi Vincent,",
          "The Q2 pricing matrix is ready for your sign-off. Margins held above 24% across every entity except LBC_CH, where the new day-rate floor pushed us to 12%.",
          "Could you review the LBC_CH adjustments before Thursday's steering committee? I've flagged the three missions that drive the variance.",
          "Thanks,\nCamille",
        ],
      },
      {
        id: 2, sender: "Granite ERP", initials: "GE", email: "noreply@granite-erp.com",
        subject: "Invoice #INV-20418 has been paid",
        time: "08:15", unread: true, tag: "Finance",
        body: [
          "Payment confirmation",
          "Invoice #INV-20418 for €128,400.00 was settled on 17 Jun 2026. The amount has been reconciled against mission Granite ERP 3.",
          "No action is required.",
        ],
      },
      {
        id: 3, sender: "Léa Fontaine", initials: "LF", email: "lea.fontaine@lbc.be",
        subject: "Re: Beacon rollout — timeline slipping",
        time: "Yesterday", unread: false, tag: "Missions",
        body: [
          "Hi all,",
          "Heads-up that the Beacon rollout is tracking two weeks behind. The integration test environment was only provisioned this morning, so QA can't start until next sprint.",
          "I'll have a revised plan by Friday. Margin impact looks contained for now.",
          "Léa",
        ],
      },
      {
        id: 4, sender: "Marco Bianchi", initials: "MB", email: "marco.bianchi@lbc.ch",
        subject: "Day-rate floor for LBC_CH",
        time: "Yesterday", unread: false, tag: "Pricing",
        body: [
          "Vincent,",
          "Per the new regulation, the minimum day rate in Switzerland rises to CHF 1,100 from July. This is what's compressing our LBC_CH margin in the Q2 model.",
          "Should we re-price the affected missions or absorb it this quarter? Happy to walk through the options.",
          "Marco",
        ],
      },
      {
        id: 5, sender: "People Ops", initials: "PO", email: "people@lbc.fr",
        subject: "3 new hires start Monday",
        time: "Tue", unread: false, tag: "Team",
        body: [
          "Welcome aboard!",
          "Three new consultants join the Paris office on Monday. Their rate cards are already loaded in the pricing console under the Consultant grade.",
          "Please make sure their first missions are staffed by end of week.",
        ],
      },
      {
        id: 6, sender: "Sofia Nawrocki", initials: "SN", email: "sofia.n@lbc.us",
        subject: "Atlas migration — final report attached",
        time: "Tue", unread: false, tag: "Reports",
        body: [
          "Hi Vincent,",
          "The Atlas migration is complete and signed off by the client. Final realized margin came in at 31.4%, two points above plan.",
          "Full report is attached. It was a great run — thanks to the whole team.",
          "Sofia",
        ],
      },
      {
        id: 7, sender: "Security", initials: "SE", email: "security@diametral.io",
        subject: "New sign-in from a new device",
        time: "Mon", unread: false, tag: "Account",
        body: [
          "We noticed a new sign-in to your Diametral account from Chrome on Windows.",
          "If this was you, no action is needed. If you don't recognize this activity, reset your password immediately.",
        ],
      },
      {
        id: 8, sender: "Juno Analytics", initials: "JA", email: "digest@juno.app",
        subject: "Weekly digest: margins up 2.1 pts",
        time: "Mon", unread: false, tag: "Reports",
        body: [
          "Your week in numbers",
          "Average margin rose 2.1 points week-over-week, driven by LBC_BE (+4.3 pts). At-risk rate fell to 5.2%. Revenue over the trailing 30 days reached €4.51M.",
          "Open the dashboard for the full breakdown.",
        ],
      },
    ];

    const FOLDERS = (unread) => [
      { label: "Inbox", href: "#inbox", active: true },
      { label: "Starred", href: "#starred" },
      { label: "Sent", href: "#sent" },
      { label: "Drafts", href: "#drafts" },
      { label: "Archive", href: "#archive" },
    ];

    /* ---- A single message row in the list ---------------------------------- */
    function MessageRow({ msg, active, onSelect }) {
      return h("button", {
        type: "button",
        className: cxLocal("msg", active && "is-active", msg.unread && "is-unread"),
        "aria-current": active ? "true" : undefined,
        onClick: () => onSelect(msg.id),
      },
        h("div", { className: "msg__avatarwrap" },
          h("span", { className: "msg__dot", "aria-hidden": "true" }),
          h(Avatar, { initials: msg.initials, "aria-label": msg.sender })
        ),
        h("div", { className: "msg__main" },
          h("div", { className: "msg__top" },
            h("span", { className: "msg__sender" }, msg.sender),
            h("span", { className: "msg__time" }, msg.time)
          ),
          h("div", { className: "msg__subject" }, msg.subject),
          h("div", { className: "msg__snippet" }, msg.body[1] || msg.body[0])
        )
      );
    }

    /* ---- Reading pane ------------------------------------------------------ */
    function ReadingPane({ msg, onArchive }) {
      const [reply, setReply] = React.useState("");

      // Reset the draft whenever a different message is opened.
      React.useEffect(() => { setReply(""); }, [msg && msg.id]);

      if (!msg) {
        return h("div", { className: "mail__col mail__col--read" },
          h(EmptyState, {
            style: { margin: "auto" },
            icon: "✉",
            title: "No conversation selected",
            description: "Pick a message from the list to read it here.",
          })
        );
      }

      return h("div", { className: "mail__col mail__col--read" },
        h("div", { className: "read__head" },
          h(Avatar, { size: "lg", initials: msg.initials, "aria-label": msg.sender }),
          h("div", { className: "read__headmeta" },
            h("h2", { className: "read__subject" }, msg.subject),
            h("div", { className: "read__from" },
              h("b", null, msg.sender), " · ", msg.email
            )
          ),
          h("div", { className: "read__actions" },
            h(Tooltip, { label: "Archive" },
              h(IconButton, { label: "Archive", onClick: () => onArchive(msg.id) }, "▾")),
            h(Tooltip, { label: "Reply" },
              h(IconButton, { label: "Reply" }, "↩")),
            h(Tooltip, { label: "Delete" },
              h(IconButton, { label: "Delete", onClick: () => onArchive(msg.id) }, "🗑"))
          )
        ),
        h("div", { className: "read__body" },
          h("div", { style: { marginBottom: "var(--ds-space-4)" } },
            h(Tag, null, msg.tag)
          ),
          msg.body.map((para, i) =>
            h("p", { key: i, style: { whiteSpace: "pre-line" } }, para))
        ),
        h("div", { className: "read__reply" },
          h(Textarea, {
            rows: 3, placeholder: "Reply to " + msg.sender + "…",
            value: reply, onChange: (e) => setReply(e.target.value),
            "aria-label": "Reply",
          }),
          h("div", { className: "read__reply-actions" },
            h(Button, { variant: "primary", disabled: !reply.trim() }, "Send"),
            h("span", { style: { color: "var(--ds-ink-faint)", fontSize: "var(--ds-text-xs)" } },
              "Replies are local to this demo")
          )
        )
      );
    }

    /* ---- App --------------------------------------------------------------- */
    function App() {
      const [messages, setMessages] = React.useState(MESSAGES);
      const [selectedId, setSelectedId] = React.useState(MESSAGES[0].id);
      const [filter, setFilter] = React.useState("all"); // "all" | "unread"

      const unreadCount = messages.filter((m) => m.unread).length;
      const visible = filter === "unread" ? messages.filter((m) => m.unread) : messages;
      const selected = messages.find((m) => m.id === selectedId) || null;

      // Selecting a message marks it read.
      const select = (id) => {
        setSelectedId(id);
        setMessages((prev) => prev.map((m) => (m.id === id ? { ...m, unread: false } : m)));
      };

      // Archive/Delete removes the message and advances the selection.
      const archive = (id) => {
        setMessages((prev) => {
          const next = prev.filter((m) => m.id !== id);
          if (id === selectedId) setSelectedId(next.length ? next[0].id : null);
          return next;
        });
      };

      const folderItems = FOLDERS().map((f) =>
        f.label === "Inbox"
          ? { ...f, label: h(React.Fragment, null,
              "Inbox",
              h(Badge, { style: { marginLeft: "auto" } }, String(unreadCount))) }
          : f
      );

      return h("div", { className: "mail" },
        // Region 1 — folders
        h("aside", { className: "mail__col mail__folders" },
          h("div", { className: "mail__head mail__brand" },
            h(Wordmark, { name: "Diametral", sub: "Mail" })
          ),
          h("div", { className: "mail__scroll" },
            h("div", { className: "mail__folders-body" },
              h(VerticalNav, { items: folderItems })
            )
          )
        ),

        // Region 2 — message list
        h("section", { className: "mail__col mail__list" },
          h("div", { className: "mail__head" },
            h("h1", { className: "mail__title" }, "Inbox")
          ),
          h("div", { className: "mail__list-tabs" },
            h(Tabs, {
              value: filter, onChange: setFilter,
              items: [
                { id: "all", label: "All" },
                { id: "unread", label: "Unread", sublabel: String(unreadCount) },
              ],
            })
          ),
          h("div", { className: "mail__scroll" },
            visible.length
              ? visible.map((m) =>
                  h(MessageRow, { key: m.id, msg: m, active: m.id === selectedId, onSelect: select }))
              : h(EmptyState, {
                  style: { padding: "var(--ds-space-7)" },
                  title: filter === "unread" ? "Inbox zero" : "No messages",
                  description: filter === "unread"
                    ? "You've read everything. Nice."
                    : "There's nothing here yet.",
                })
          )
        ),

        // Region 3 — reading pane
        h(ReadingPane, { msg: selected, onArchive: archive })
      );
    }

    createRoot(document.getElementById("app")).render(h(App));
  </script>
</body>
</html>
