<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Diametral Design System</title>
  <link rel="icon" href="../../assets/logo/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/fonts/ufficio.css">
  <link rel="stylesheet" href="../../css/diametral.css">
  <style>
    /* Page-local layout only — centering the auth card on the brand background.
       No component styles here; everything visual comes from .ds-* + tokens. */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ds-bg);
      color: var(--ds-ink);
      font-family: var(--ds-font-sans);
      padding: 24px;
    }
    .demo-back {
      position: fixed;
      top: 20px;
      left: 24px;
      font-size: var(--ds-text-xs);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ds-ink-faint);
      text-decoration: none;
      z-index: 10;
    }
    .demo-back:hover { color: var(--ds-ink); }
    #app { width: 100%; max-width: 380px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react"
    }
  }
  </script>
</head>
<body>
  <a class="demo-back" href="../index.html">← Diametral</a>
  <div id="app"></div>

  <script type="module">
    import React from "react";
    import { createRoot } from "react-dom/client";
    import {
      Button, Field, Input, Checkbox, SectionHeading, Wordmark, Tabs, FieldHint,
    } from "../../react/index.js";

    const h = React.createElement;

    function SignInForm() {
      const [email, setEmail] = React.useState("");
      const [password, setPassword] = React.useState("");
      const [remember, setRemember] = React.useState(true);
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState(null);

      const submit = (e) => {
        e.preventDefault();
        if (!email || !password) {
          setError("Enter your email and password to continue.");
          return;
        }
        setError(null);
        setLoading(true);
        // Fake an auth round-trip so the loading state is visible.
        setTimeout(() => setLoading(false), 1400);
      };

      return h("form", {
        onSubmit: submit,
        style: { display: "flex", flexDirection: "column", gap: "16px", padding: "0 28px 28px" },
      },
        error
          ? h(FieldHint, { status: "error", role: "alert" }, error)
          : null,
        h(Field, { label: "Email", htmlFor: "login-email" },
          h(Input, {
            id: "login-email", type: "email", name: "email", autoComplete: "email",
            placeholder: "you@diametral.io", value: email,
            onChange: (e) => setEmail(e.target.value),
          })
        ),
        h(Field, { label: "Password", htmlFor: "login-password" },
          h(Input, {
            id: "login-password", type: "password", name: "password",
            autoComplete: "current-password", placeholder: "••••••••", value: password,
            onChange: (e) => setPassword(e.target.value),
          })
        ),
        h("div", {
          style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: "12px" },
        },
          h(Checkbox, { checked: remember, onChange: setRemember }, "Remember me"),
          h("a", {
            href: "#",
            style: { fontSize: "var(--ds-text-xs)", color: "var(--ds-ink-soft)", textDecoration: "none" },
            onClick: (e) => e.preventDefault(),
          }, "Forgot?")
        ),
        h(Button, { type: "submit", variant: "primary", block: true, loading },
          loading ? "Signing in…" : "Sign in"),
        h(SectionHeading, { style: { margin: "4px 0" } }, "or"),
        h(Button, { type: "button", block: true }, "Continue with SSO")
      );
    }

    function CreateAccountForm() {
      const [done, setDone] = React.useState(false);
      const [loading, setLoading] = React.useState(false);

      const submit = (e) => {
        e.preventDefault();
        setLoading(true);
        setTimeout(() => { setLoading(false); setDone(true); }, 1400);
      };

      return h("form", {
        onSubmit: submit,
        style: { display: "flex", flexDirection: "column", gap: "16px", padding: "0 28px 28px" },
      },
        done
          ? h(FieldHint, { status: "success" }, "Account created — check your inbox to verify.")
          : null,
        h(Field, { label: "Full name", htmlFor: "su-name" },
          h(Input, { id: "su-name", type: "text", autoComplete: "name", placeholder: "Ada Lovelace" })
        ),
        h(Field, { label: "Work email", htmlFor: "su-email" },
          h(Input, { id: "su-email", type: "email", autoComplete: "email", placeholder: "you@diametral.io" })
        ),
        h(Field, { label: "Password", htmlFor: "su-password" },
          h(Input, { id: "su-password", type: "password", autoComplete: "new-password", placeholder: "••••••••" }),
          h(FieldHint, null, "At least 8 characters, one number.")
        ),
        h(Button, { type: "submit", variant: "primary", block: true, loading },
          loading ? "Creating…" : "Create account"),
        h(SectionHeading, { style: { margin: "4px 0" } }, "or"),
        h(Button, { type: "button", block: true }, "Continue with SSO")
      );
    }

    function Auth() {
      const head = h("div", {
        style: {
          display: "flex", flexDirection: "column", alignItems: "center",
          gap: "18px", padding: "32px 28px 8px",
        },
      },
        h(Wordmark, { name: "Diametral" }),
        h("h1", {
          style: {
            fontFamily: "var(--ds-font-title)", fontWeight: "var(--ds-font-weight-title)",
            fontSize: "var(--ds-text-xl)", letterSpacing: "-0.4px",
            lineHeight: "var(--ds-leading-tight)", margin: "8px 0 0", textAlign: "center",
          },
        }, "Welcome back")
      );

      return h("div", { className: "ds-card" },
        head,
        h("div", { style: { padding: "0 28px" } },
          h(Tabs, {
            items: [
              { id: "signin", label: "Sign in", content: h(SignInForm) },
              { id: "create", label: "Create account", content: h(CreateAccountForm) },
            ],
          })
        )
      );
    }

    createRoot(document.getElementById("app")).render(h(Auth));
  </script>
</body>
</html>
