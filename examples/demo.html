<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diametral — Console (live React demo)</title>
  <link rel="icon" href="../assets/logo/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/fonts/ufficio.css">
  <link rel="stylesheet" href="../css/diametral.css">
  <!-- Import map MUST precede any module script so bare "react" specifiers resolve. -->
  <script type="importmap">
  { "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react"
  } }
  </script>
  <style>
    html, body { height: 100%; }
    #app { min-height: 100vh; }
    .demo-back { position: fixed; left: 14px; bottom: 12px; z-index: 50; font-size: 12px;
      color: var(--ds-ink-faint); text-decoration: none; background: var(--ds-bg);
      border: 1px solid var(--ds-rule); padding: 4px 10px; }
    .demo-back:hover { color: var(--ds-ink); }
    .ap { display: grid; grid-template-columns: 232px minmax(0,1fr); min-height: 100vh; }
    .ap__side { border-right: 1px solid var(--ds-rule); background: var(--ds-bg); position: sticky; top: 57px; height: calc(100vh - 57px); overflow: auto; padding: 8px 0 24px; }
    .ap__main { min-width: 0; background: var(--ds-bg-alt); }
    .ap__bar { grid-column: 1 / -1; }
    /* ONE content width for every view → consistent body width. */
    .ap__wrap { max-width: 1180px; margin: 0 auto; padding: 28px 32px 80px; }
    .ap__search { flex: 1; max-width: 340px; margin-left: 8px; display: flex; align-items: center;
      justify-content: space-between; gap: 8px; background: var(--ds-bg); border: 1px solid var(--ds-rule);
      color: var(--ds-ink-faint); font: inherit; font-size: 13px; padding: 7px 10px; cursor: pointer; text-align: left; }
    .ap__search:hover { background: var(--ds-bg-alt); }
    .ap__navlabel { padding: 16px 18px 6px; color: var(--ds-ink-faint); margin: 0; }
    .ap__navitem { display: flex; justify-content: space-between; align-items: center; width: 100%;
      background: none; border: none; text-align: left; font: inherit; cursor: pointer; }
    .linklike { background: none; border: none; padding: 0; font: inherit; color: var(--ds-accent); cursor: pointer; text-align: left; }
    .linklike:hover { text-decoration: underline; }
    .ph { font-family: var(--ds-font-title); font-weight: 300; font-size: 26px; letter-spacing: -.4px; }
    .psub { color: var(--ds-ink-soft); margin: 4px 0 22px; }
    .row { display: flex; gap: 10px; align-items: center; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid2 { display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; align-items: start; }
    @media (max-width: 1040px){ .grid4{grid-template-columns:repeat(2,1fr)} .grid2,.grid3,.grid-2{grid-template-columns:1fr} }
    .ib { display: grid; grid-template-columns: 320px minmax(0,1fr); border: 1px solid var(--ds-rule); min-height: 560px; }
    .ib__list { border-right: 1px solid var(--ds-rule); background: var(--ds-bg); overflow: auto; }
    .ib__row { display: flex; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--ds-rule-soft); cursor: pointer; }
    .ib__row:hover { background: var(--ds-bg-alt); }
    .ib__row.on { background: var(--ds-accent-bg); }
    .ib__dot { width: 7px; height: 7px; background: var(--ds-accent); margin-top: 6px; flex: none; }
    .ib__read { background: var(--ds-bg); padding: 24px 26px; }
    .card-pad { padding: 18px 20px; }
    .prose { line-height: 1.65; color: var(--ds-ink-soft); max-width: 68ch; }
    .prose p { margin: 0 0 14px; }
  </style>
</head>
<body>
  <a class="demo-back" href="index.html">← Design system</a>
  <div id="app" style="display:grid;place-items:center;color:var(--ds-ink-faint)">Loading the live React demo…</div>
  <script type="module">
    import { mount } from "./demo/app.js";
    mount();
  </script>
</body>
</html>
